<!DOCTYPE html>
<html>
<head>
<title>AI Fake Profile Detector</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:380px;
text-align:center;
}

h2{
font-size:30px;
color:#333;
margin-bottom:20px;
}

label{
font-size:16px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#667eea;
color:white;
border:none;
padding:12px;
width:100%;
font-size:18px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4b5bdc;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.real{
color:green;
}

.fake{
color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>🤖 AI Fake Profile Detector</h2>

<form action="/predict" method="post">

<label>Followers</label>
<input type="number" name="followers" required>

<label>Following</label>
<input type="number" name="following" required>

<label>Posts</label>
<input type="number" name="posts" required>

<label>Username Length</label>
<input type="number" name="username_length" required>

<label>Bio Length</label>
<input type="number" name="bio_length" required>

<label>Profile Picture (1 = Yes, 0 = No)</label>
<input type="number" name="profile_pic" required>

<label>Verified (1 = Yes, 0 = No)</label>
<input type="number" name="verified" required>

<button type="submit">Check Profile</button>

</form>

<div class="result">
{{ prediction_text | safe }}
</div>

</div>

</body>
</html>
